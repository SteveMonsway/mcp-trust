# MCP Trust — public benchmark seed (TZ §14.3)
#
# A curated list of real, public MCP servers scanned by `pnpm scan:seed`.
# Each entry is fed verbatim to the target parser (github.com/owner/repo[/path]).
# `expectedCapabilities` records what the server is *documented* to do — it is a
# reference for the human reading the report, NOT an assertion the scanner makes.
# The scanner reports what it actually finds; divergence is itself signal.
#
# Categories mirror TZ §14.2 (capability taxonomy). `source: github` clones a
# shallow, blob-limited copy and runs static + Semgrep analysis (github targets
# are never executed/introspected — see docs/architecture/sandboxing.md).

# --- Reference servers (modelcontextprotocol/servers) ---
- id: mcp-ref-filesystem
  category: filesystem
  source: github
  locator: github.com/modelcontextprotocol/servers/src/filesystem
  expectedCapabilities: [filesystem_read, filesystem_write]
- id: mcp-ref-git
  category: git
  source: github
  locator: github.com/modelcontextprotocol/servers/src/git
  expectedCapabilities: [filesystem_read, repository_write]
- id: mcp-ref-fetch
  category: network
  source: github
  locator: github.com/modelcontextprotocol/servers/src/fetch
  expectedCapabilities: [network_egress]
- id: mcp-ref-memory
  category: knowledge
  source: github
  locator: github.com/modelcontextprotocol/servers/src/memory
  expectedCapabilities: [filesystem_read, filesystem_write]
- id: mcp-ref-time
  category: utility
  source: github
  locator: github.com/modelcontextprotocol/servers/src/time
  expectedCapabilities: []
- id: mcp-ref-sequentialthinking
  category: utility
