  locator: github.com/modelcontextprotocol/servers/src/sequentialthinking
  expectedCapabilities: []
- id: mcp-ref-everything
  category: reference
  source: github
  locator: github.com/modelcontextprotocol/servers/src/everything
  expectedCapabilities: [filesystem_read, network_egress]

